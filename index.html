<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>N64 Emulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="rom-loader">
        <label for="rom-file">Load N64 ROM:</label>
        <input type="file" id="rom-file" accept=".z64,.n64,.v64">
    </div>
    <div class="emulator">
        <canvas id="screen"></canvas>
        <div class="controls">
            <div class="left-pad">
                <div class="d-pad">
                    <div class="btn" id="d-up"></div>
                    <div class="btn" id="d-left"></div>
                    <div class="btn" id="d-right"></div>
                    <div class="btn" id="d-down"></div>
                </div>
                <div class="joystick"></div>
            </div>
            <div class="right-pad">
                <div class="l-r-buttons">
                    <div class="btn" id="l-btn">L</div>
                    <div class="btn" id="r-btn">R</div>
                </div>
                <div class="c-buttons">
                    <div class="btn" id="c-up"></div>
                    <div class="btn" id="c-left"></div>
                    <div class="btn" id="c-right"></div>
                    <div class="btn" id="c-down"></div>
                </div>
                <div class="abz-buttons">
                    <div class="btn" id="a-btn">A</div>
                    <div class="btn" id="b-btn">B</div>
                    <div class="btn" id="z-btn">Z</div>
                </div>
            </div>
        </div>
    </div>
    <script src="cpu.js"></script>
    <script src="rcp.js"></script>
    <script src="memory.js"></script>
    <script src="mmu.js"></script>
    <script src="script.js"></script>
</body>
</html>
